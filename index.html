<!doctype html>
<html lang="en">
  <head>
    <title>truchettiles</title>
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow,noarchive" />
    <link rel="icon" type="image/x-icon" href="images/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@200..900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/index.css" />
  </head>
  <body>
    <canvas id="truchet-tiles"></canvas>
    <div id="main-panel">
      <div id="demo-grid-container">
        <div id="demo-grid">
          <div id="demo-grid-header">
            <p id="demo-grid-title">truchet-tiles</p>
            <div id="demo-grid-randomize-button">
              <img id="demo-grid-randomize-button-image" src="images/icons/shuffle.svg" alt="Randomize Button" />
            </div>
          </div>
          <div id="demo-grid-tile-1" class="demo-grid-tile" data-pattern-id="1">
            <img class="demo-grid-tile-image" src="images/tiles/t1.svg" />
          </div>
          <div id="demo-grid-tile-2" class="demo-grid-tile" data-pattern-id="2">
            <img class="demo-grid-tile-image" src="images/tiles/t2.svg" />
          </div>
          <div id="demo-grid-tile-3" class="demo-grid-tile" data-pattern-id="3">
            <img class="demo-grid-tile-image" src="images/tiles/t3.svg" />
          </div>
          <div id="demo-grid-tile-4" class="demo-grid-tile" data-pattern-id="4">
            <img class="demo-grid-tile-image" src="images/tiles/t4.svg" />
          </div>
          <div id="demo-grid-tile-5" class="demo-grid-tile" data-pattern-id="5">
            <img class="demo-grid-tile-image" src="images/tiles/t5.svg" />
          </div>
          <div id="demo-grid-tile-6" class="demo-grid-tile" data-pattern-id="6">
            <img class="demo-grid-tile-image" src="images/tiles/t6.svg" />
          </div>
          <div id="demo-grid-tile-7" class="demo-grid-tile" data-pattern-id="7">
            <img class="demo-grid-tile-image" src="images/tiles/t7.svg" />
          </div>
          <div id="demo-grid-tile-8" class="demo-grid-tile" data-pattern-id="8">
            <img class="demo-grid-tile-image" src="images/tiles/t8.svg" />
          </div>
          <div id="demo-grid-tile-9" class="demo-grid-tile" data-pattern-id="9">
            <img class="demo-grid-tile-image" src="images/tiles/t9.svg" />
          </div>
          <div id="demo-grid-tile-10" class="demo-grid-tile" data-pattern-id="10">
            <img class="demo-grid-tile-image" src="images/tiles/t10.svg" />
          </div>
          <div id="demo-grid-tile-11" class="demo-grid-tile" data-pattern-id="11">
            <img class="demo-grid-tile-image" src="images/tiles/t11.svg" />
          </div>
          <div id="demo-grid-tile-12" class="demo-grid-tile" data-pattern-id="12">
            <img class="demo-grid-tile-image" src="images/tiles/t12.svg" />
          </div>
          <div id="demo-grid-tile-13" class="demo-grid-tile" data-pattern-id="13">
            <img class="demo-grid-tile-image" src="images/tiles/t13.svg" />
          </div>
          <div id="demo-grid-tile-14" class="demo-grid-tile" data-pattern-id="14">
            <img class="demo-grid-tile-image" src="images/tiles/t14.svg" />
          </div>
          <div id="demo-grid-tile-15" class="demo-grid-tile" data-pattern-id="15">
            <img class="demo-grid-tile-image" src="images/tiles/t15.svg" />
          </div>
          <div id="demo-grid-color-input-primary" class="demo-grid-color-input" data-color-type="primaryColor">
            <input class="demo-grid-color-input-field" type="text" spellcheck="false" enterkeyhint="done" />
            <div class="demo-grid-color-button">
              <img class="demo-grid-color-button-image" src="images/icons/dropper.svg" alt="Color Picker Button" />
            </div>
          </div>
          <div id="demo-grid-color-input-secondary" class="demo-grid-color-input" data-color-type="secondaryColor">
            <input class="demo-grid-color-input-field" type="text" spellcheck="false" enterkeyhint="done" />
            <div class="demo-grid-color-button">
              <img class="demo-grid-color-button-image" src="images/icons/dropper.svg" alt="Color Picker Button" />
            </div>
          </div>
          <div id="demo-grid-color-input-stroke" class="demo-grid-color-input" data-color-type="strokeColor">
            <input class="demo-grid-color-input-field" type="text" spellcheck="false" enterkeyhint="done" />
            <div class="demo-grid-color-button">
              <img class="demo-grid-color-button-image" src="images/icons/dropper.svg" alt="Color Picker Button" />
            </div>
          </div>
          <div id="demo-grid-stroke-size-slider" class="demo-grid-slider" data-min="0" data-max="100">
            <div class="demo-grid-slider-container">
              <div class="demo-grid-slider-thumb-container">
                <div class="demo-grid-slider-thumb"></div>
              </div>
            </div>
          </div>
          <div id="demo-grid-tile-size-slider" class="demo-grid-slider" data-min="0" data-max="100">
            <div class="demo-grid-slider-container">
              <div class="demo-grid-slider-thumb-container">
                <div class="demo-grid-slider-thumb"></div>
              </div>
            </div>
          </div>
          <div id="demo-grid-copy-button">
            <span id="demo-grid-copy-button-text">copy &lt;canvas/&gt; code</span>
          </div>
        </div>
      </div>
      <div id="color-picker-container" class="hidden">
        <div id="color-picker"></div>
      </div>
    </div>
    <div id="color-picker-outside-area"></div>
  </body>
  <script src="js/constants.js" type="module"></script>
  <script src="js/tinycolor.min.js" type="module"></script>
  <script src="js/utils.js" type="module"></script>
  <script src="js/truchet-tiles.js" type="module"></script>
  <script src="js/index.js" type="module"></script>
</html>
